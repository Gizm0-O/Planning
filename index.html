<!DOCTYPE html>
<html lang=\"cs\" data-theme=\"dark\">
<head>
    <meta charset=\"UTF-8\">
    <meta name=\"viewport\" content=\"width=device-width, initial-scale=1.0\">
    <title>Rodinný Kalendář</title>
    <link rel=\"preconnect\" href=\"https://fonts.googleapis.com\">
    <link rel=\"preconnect\" href=\"https://fonts.gstatic.com\" crossorigin>
    <link href=\"https://fonts.googleapis.com/css2?family=Inter:wght@300..700&display=swap\" rel=\"stylesheet\">
    <style>
        :root, [data-theme=\"light\"] {
            --color-bg:#f7f6f2;--color-surface:#f9f8f5;--color-surface-2:#fbfbf9;
            --color-surface-offset:#f3f0ec;--color-surface-dynamic:#e6e4df;
            --color-divider:#dcd9d5;--color-border:#d4d1ca;
            --color-text:#28251d;--color-text-muted:#7a7974;--color-text-faint:#bab9b4;
            --color-primary:#01696f;--color-primary-hover:#0c4e54;
            --shadow-sm:0 1px 2px oklch(0.2 0.01 80 / 0.06);
            --shadow-md:0 4px 12px oklch(0.2 0.01 80 / 0.08);
            --shadow-lg:0 12px 32px oklch(0.2 0.01 80 / 0.12);
            --radius-sm:.375rem;--radius-md:.5rem;--radius-lg:.75rem;--radius-xl:1rem;--radius-full:9999px;
            --transition:180ms cubic-bezier(0.16,1,0.3,1);
            --space-1:.25rem;--space-2:.5rem;--space-3:.75rem;--space-4:1rem;
            --font-body:'Inter',sans-serif;
            --tadas-office-color:#006494;--tadas-office-bg:#18304a;--tadas-office-border:#5591c7;
            --barca-color:#f07090;--barca-bg:#3d1020;--barca-border:#f07090;
            --hour-height: 44px; --time-col-width: 46px; --cal-start-hour: 6; --cal-end-hour: 22;
        }
        [data-theme=\"dark\"] {
            --color-bg:#171614;--color-surface:#1c1b19;--color-surface-2:#201f1d;
            --color-divider:#262523;--color-border:#393836;
            --color-text:#cdccca;--color-text-muted:#797876;--color-text-faint:#5a5957;
            --color-primary:#4f98a3;--color-primary-hover:#227f8b;
        }
        *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
        body{min-height:100dvh;font-family:var(--font-body);color:var(--color-text);background:var(--color-bg);line-height:1.5}
        button{cursor:pointer;background:none;border:none;font:inherit;color:inherit}
        .app{max-width:1400px;margin:0 auto;padding:var(--space-4)}
        .header{display:flex;align-items:center;justify-content:space-between;margin-bottom:var(--space-3)}
        .btn{display:inline-flex;align-items:center;padding:var(--space-2) var(--space-4);font-size:13px;font-weight:600;border-radius:var(--radius-md);transition:background var(--transition)}
        .btn-swap{background:linear-gradient(135deg,var(--tadas-office-bg),var(--barca-bg));border:1px solid oklch(from var(--color-text) l c h / 0.1)}
        .controls-row{display:grid;grid-template-columns:var(--time-col-width) 1fr;margin-bottom:var(--space-3)}
        .controls-content{grid-column:2;display:flex;align-items:center;justify-content:space-between}
        .legend{display:flex;gap:var(--space-4);font-size:11px;color:var(--color-text-muted)}
        .legend-dot{width:10px;height:10px;border-radius:2px;display:inline-block;margin-right:6px}
        .main-layout{display:grid;grid-template-columns:1fr 280px;gap:var(--space-4);align-items:start}
        .timeline-outer{display:grid;grid-template-columns:var(--time-col-width) repeat(7, 1fr);min-width:720px}
        .tl-header-spacer{border-bottom:1px solid var(--color-divider);position:sticky;top:0;z-index:10}
        .tl-day-header{padding:var(--space-2);text-align:center;background:var(--color-surface);border-left:1px solid var(--color-divider);border-bottom:1px solid var(--color-divider);position:sticky;top:0;z-index:10}
        .tl-body{grid-column:1 / -1;display:grid;grid-template-columns:var(--time-col-width) repeat(7, 1fr);position:relative}
        .tl-time-col{position:relative}
        .tl-hour-label{position:absolute;right:8px;font-size:11px;color:var(--color-text-faint);transform:translateY(-50%)}
        .tl-day-col{position:relative;border-left:1px solid var(--color-divider)}
        .tl-hour-line{position:absolute;left:0;right:0;height:1px;background:var(--color-divider)}
        .tl-now-line{position:absolute;left:0;right:0;height:2px;background:#f5a623;z-index:5;display:flex;align-items:center;pointer-events:none}
        .tl-now-dot{position:absolute;left:0;top:-4px;width:10px;height:10px;border-radius:50%;background:#f5a623;transform:translateX(-50%)}
        .tl-now-label{position:absolute;left:0;top:50%;transform:translate(-110%,-50%);font-size:10px;font-weight:700;color:#f5a623;background:var(--color-bg);padding:1px 5px;border-radius:10px;border:1px solid #f5a623}
        .tl-event{position:absolute;left:3px;right:3px;border-radius:var(--radius-sm);border-left:3px solid transparent;padding:4px 6px;overflow:hidden;z-index:2}
        .shift-tadas-office{background:var(--tadas-office-bg);color:var(--tadas-office-color);border-left-color:var(--tadas-office-border)}
        .shift-tadas-home{background:var(--tadas-office-bg);opacity:0.8;color:var(--tadas-office-color);border-left-color:var(--tadas-office-border)}
        .shift-barca{background:var(--barca-bg);color:var(--barca-color);border-left-color:var(--barca-border)}
        .ev-time{font-size:10px;opacity:.65;display:block}
        .ev-label{font-size:11px;font-weight:700;display:block;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
        .todo-panel{background:var(--color-surface);border:1px solid var(--color-divider);border-radius:var(--radius-lg);padding:var(--space-3);position:sticky;top:var(--space-4)}
        .todo-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:var(--space-2)}
        .todo-title{font-size:13px;font-weight:700}
        .todo-list{display:flex;flex-direction:column;gap:4px}
        .todo-item{display:flex;align-items:center;gap:8px;padding:4px 8px;background:var(--color-surface-offset);border-radius:var(--radius-sm);font-size:12px;transition:opacity 0.2s}
        .todo-item.done{opacity:0.4;text-decoration:line-through}
        .todo-check{cursor:pointer}
        .todo-text{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
        .todo-del{opacity:0.3;font-size:10px}
        .todo-del:hover{opacity:1}
        .todo-form{display:none;margin-top:8px;gap:4px;flex-direction:column}
        .todo-form.open{display:flex}
        .todo-input{width:100%;padding:4px 8px;border-radius:4px;background:var(--color-bg);border:1px solid var(--color-divider);color:inherit;font-size:12px}
    </style>
</head>
<body>
    <div class=\"app\">
        <header class=\"header\">
            <div class=\"logo\"><span style=\"font-weight:800;font-size:20px\">Plán</span></div>
            <div class=\"header-actions\">
                <button class=\"btn btn-swap\" id=\"swapBtn\" onclick=\"swapSelectedDay()\" disabled>Přehodit směny</button>
                <button onclick=\"document.documentElement.setAttribute('data-theme', document.documentElement.getAttribute('data-theme')==='dark'?'light':'dark')\">🌙</button>
            </div>
        </header>
        <div class=\"controls-row\">
            <div class=\"controls-content\">
                <div class=\"legend\">
                    <div><span class=\"legend-dot\" style=\"background:var(--tadas-office-color)\"></span>Tadeáš</div>
                    <div><span class=\"legend-dot\" style=\"background:var(--barca-color)\"></span>Barča</div>
                </div>
                <div class=\"week-nav\">
                    <button onclick=\"changeWeek(-1)\">‹ Předchozí</button>
                    <span id=\"weekRangeLabel\" style=\"font-weight:600;font-size:13px;margin:0 15px\"></span>
                    <button onclick=\"changeWeek(1)\">Další ›</button>
                </div>
            </div>
        </div>
        <div class=\"main-layout\">
            <div class=\"timeline-wrapper\">
                <div class=\"timeline-outer\" id=\"timelineOuter\"></div>
            </div>
            <aside class=\"todo-panel\">
                <div class=\"todo-header\"><span class=\"todo-title\">📋 Dnešní úkoly</span><button onclick=\"toggleTodoForm()\" style=\"font-weight:bold\">+</button></div>
                <div class=\"todo-form\" id=\"todoForm\">
                    <input type=\"text\" id=\"todoInput\" class=\"todo-input\" placeholder=\"Nový úkol...\">
                    <button onclick=\"addTodo()\" style=\"font-size:11px;background:var(--color-primary);color:white;border-radius:4px;padding:2px\">Přidat</button>
                </div>
                <div id=\"todoList\" class=\"todo-list\"></div>
            </aside>
        </div>
    </div>
    <script>
        const START_HOUR = 6, END_HOUR = 22, HOUR_PX = 44, TOTAL_H = (END_HOUR - START_HOUR) * HOUR_PX;
        let currentWeekOffset = 0, swappedDays = {}, swapSelectedKey = null;
        let todos = [{id:1,text:'Vysát',done:false},{id:2,text:'Vytřít',done:false},{id:3,text:'Barča: Oběd',done:false}];
        const BASE_SHIFTS = [
            {type:'shift-tadas-office', label:'Ranní', from:'07:00', to:'14:00', days:[1,3,5]},
            {type:'shift-barca', label:'Ranní', from:'07:00', to:'14:00', days:[2,4]},
            {type:'shift-barca', label:'Odpolední', from:'14:00', to:'21:00', days:[1,3,5]},
            {type:'shift-tadas-home', label:'Odpolední', from:'14:00', to:'21:00', days:[2,4]}
        ];
        function renderCalendar(){
            const outer=document.getElementById('timelineOuter'); outer.innerHTML='';
            const today=new Date(); today.setHours(0,0,0,0);
            const mon=getMonday(today); mon.setDate(mon.getDate()+currentWeekOffset*7);
            document.getElementById('weekRangeLabel').textContent = mon.toLocaleDateString('cs-CZ',{day:'numeric',month:'short'}) + ' – ' + new Date(mon.getTime()+6*86400000).toLocaleDateString('cs-CZ',{day:'numeric',month:'short'});
            outer.appendChild(Object.assign(document.createElement('div'), {className:'tl-header-spacer'}));
            for(let i=0;i<7;i++){
                const d=new Date(mon); d.setDate(d.getDate()+i); const key=d.toISOString().split('T')[0];
                const hd=document.createElement('div'); hd.className='tl-day-header' + (swapSelectedKey===key?' selected-for-swap':'');
                hd.innerHTML=`<div style=\"font-size:10px;opacity:0.5\">${['Ne','Po','Út','St','Čt','Pá','So'][d.getDay()]}</div><div style=\"font-weight:bold\">${d.getDate()}</div>`;
                hd.onclick=()=> { swapSelectedKey=key; document.getElementById('swapBtn').disabled=false; renderCalendar(); };
                outer.appendChild(hd);
            }
            const body=document.createElement('div'); body.className='tl-body'; body.style.height=TOTAL_H+'px'; outer.appendChild(body);
            const tCol=document.createElement('div'); tCol.className='tl-time-col'; body.appendChild(tCol);
            for(let h=START_HOUR;h<=END_HOUR;h++){
                const l=document.createElement('div'); l.className='tl-hour-label'; l.style.top=(h-START_HOUR)*HOUR_PX+'px'; l.textContent=h+':00'; tCol.appendChild(l);
            }
            for(let i=0;i<7;i++){
                const d=new Date(mon); d.setDate(d.getDate()+i); const key=d.toISOString().split('T')[0];
                const col=document.createElement('div'); col.className='tl-day-col'; col.style.height=TOTAL_H+'px'; body.appendChild(col);
                for(let h=START_HOUR;h<=END_HOUR;h++){
                    col.appendChild(Object.assign(document.createElement('div'), {className:'tl-hour-line', style:\\`top:${(h-START_HOUR)*HOUR_PX}px\\`}));
                }
                if(today.toISOString().split('T')[0]===key){
                    const n=new Date(); const m=n.getHours()*60+n.getMinutes();
                    if(m>=START_HOUR*60 && m<=END_HOUR*60){
                        const nl=document.createElement('div'); nl.className='tl-now-line'; nl.style.top=(((m - START_HOUR*60)/60)*HOUR_PX)+'px';
                        if(i===0) nl.appendChild(Object.assign(document.createElement('div'),{className:'tl-now-dot'}));
                        const lbl=document.createElement('div'); lbl.className='tl-now-label'; lbl.textContent=n.getHours().toString().padStart(2,'0')+':'+n.getMinutes().toString().padStart(2,'0'); nl.appendChild(lbl);
                        col.appendChild(nl);
                    }
                }
                BASE_SHIFTS.filter(r=>r.days.includes(d.getDay())).forEach(ev=>{
                    const start=(ev.from.split(':')[0]*60+(+ev.from.split(':')[1])), end=(ev.to.split(':')[0]*60+(+ev.to.split(':')[1]));
                    let type=ev.type; if(swappedDays[key]){ if(type.includes('tadas')) type='shift-barca'; else if(type==='shift-barca') type='shift-tadas-office'; }
                    const b=document.createElement('div'); b.className='tl-event '+type; b.style.top=(((start-START_HOUR*60)/60)*HOUR_PX)+'px'; b.style.height=(((end-start)/60)*HOUR_PX)+'px';
                    b.innerHTML=\\`<span class=\"ev-time\">${ev.from}</span><span class=\"ev-label\">${ev.label}</span>\\`; col.appendChild(b);
                });
            }
        }
        function getMonday(d){ d=new Date(d); const day=d.getDay(), diff=d.getDate()-day+(day===0?-6:1); return new Date(d.setDate(diff)); }
        function changeWeek(n){ currentWeekOffset+=n; renderCalendar(); }
        function swapSelectedDay(){ if(swapSelectedKey){ swappedDays[swapSelectedKey]=!swappedDays[swapSelectedKey]; renderCalendar(); } }
        function renderTodos(){
            const list=document.getElementById('todoList'); list.innerHTML='';
            todos.forEach(t=>{
                const item=document.createElement('div'); item.className='todo-item'+(t.done?' done':'');
                item.innerHTML=\\`<input type=\"checkbox\" class=\"todo-check\" ${t.done?'checked':''} onchange=\"toggleTodo(${t.id})\"><span class=\"todo-text\">${t.text}</span><button class=\"todo-del\" onclick=\"delTodo(${t.id})\">✕</button>\\`;
                list.appendChild(item);
            });
        }
        function toggleTodo(id){ const t=todos.find(x=>x.id===id); if(t) t.done=!t.done; renderTodos(); }
        function delTodo(id){ todos=todos.filter(x=>x.id!==id); renderTodos(); }
        function toggleTodoForm(){ document.getElementById('todoForm').classList.toggle('open'); }
        function addTodo(){ const i=document.getElementById('todoInput'); if(i.value){ todos.push({id:Date.now(),text:i.value,done:false}); i.value=''; renderTodos(); } }
        renderCalendar(); renderTodos();
    </script>
</body>
</html>
