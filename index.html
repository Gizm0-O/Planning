<!DOCTYPE html>
<html lang="cs" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rodinný Kalendář</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300..700&display=swap" rel="stylesheet">
<style>
:root, [data-theme="light"] {
  --color-bg:#f7f6f2;--color-surface:#f9f8f5;--color-surface-2:#fbfbf9;
  --color-surface-offset:#f3f0ec;--color-surface-dynamic:#e6e4df;
  --color-divider:#dcd9d5;--color-border:#d4d1ca;
  --color-text:#28251d;--color-text-muted:#7a7974;--color-text-faint:#bab9b4;
  --color-primary:#01696f;--color-primary-hover:#0c4e54;
  --shadow-sm:0 1px 2px oklch(0.2 0.01 80 / 0.06);
  --shadow-md:0 4px 12px oklch(0.2 0.01 80 / 0.08);
  --shadow-lg:0 12px 32px oklch(0.2 0.01 80 / 0.12);
  --radius-sm:.375rem;--radius-md:.5rem;--radius-lg:.75rem;--radius-xl:1rem;--radius-full:9999px;
  --transition:180ms cubic-bezier(0.16,1,0.3,1);
  --space-1:.25rem;--space-2:.5rem;--space-3:.75rem;--space-4:1rem;
  --space-5:1.25rem;--space-6:1.5rem;--space-8:2rem;
  --text-xs:clamp(0.75rem,0.7rem + 0.25vw,0.875rem);
  --text-sm:clamp(0.875rem,0.8rem + 0.35vw,1rem);
  --text-base:clamp(1rem,0.95rem + 0.25vw,1.125rem);
  --text-lg:clamp(1.125rem,1rem + 0.75vw,1.5rem);
  --font-body:'Inter',sans-serif;
  --tadas-office-color:#006494;--tadas-office-bg:#c6d8e4;--tadas-office-border:#006494;
  --tadas-home-color:#1a6fa8;--tadas-home-bg:#d5e8f7;--tadas-home-border:#1a6fa8;
  --barca-color:#b91c3e;--barca-bg:#f5cdd7;--barca-border:#b91c3e;
  --task-color:#da7101;--task-bg:#e7d7c4;
  /* Timeline */
  --hour-height: 44px;
  --time-col-width: 46px;
  --cal-start-hour: 6;
  --cal-end-hour: 22;
}
[data-theme="dark"] {
  --color-bg:#171614;--color-surface:#1c1b19;--color-surface-2:#201f1d;
  --color-surface-offset:#1d1c1a;--color-surface-dynamic:#2d2c2a;
  --color-divider:#262523;--color-border:#393836;
  --color-text:#cdccca;--color-text-muted:#797876;--color-text-faint:#5a5957;
  --color-primary:#4f98a3;--color-primary-hover:#227f8b;
  --shadow-sm:0 1px 2px oklch(0 0 0 / 0.2);
  --shadow-md:0 4px 12px oklch(0 0 0 / 0.3);
  --shadow-lg:0 12px 32px oklch(0 0 0 / 0.4);
  --tadas-office-color:#5591c7;--tadas-office-bg:#18304a;--tadas-office-border:#5591c7;
  --tadas-home-color:#7eb8e8;--tadas-home-bg:#122840;--tadas-home-border:#7eb8e8;
  --barca-color:#f07090;--barca-bg:#3d1020;--barca-border:#f07090;
  --task-color:#fdab43;--task-bg:#2e1f0a;
}
@media (prefers-color-scheme:dark){:root:not([data-theme]){
  --color-bg:#171614;--color-surface:#1c1b19;--color-surface-2:#201f1d;
  --color-surface-offset:#1d1c1a;--color-surface-dynamic:#2d2c2a;
  --color-divider:#262523;--color-border:#393836;
  --color-text:#cdccca;--color-text-muted:#797876;--color-text-faint:#5a5957;
  --color-primary:#4f98a3;--color-primary-hover:#227f8b;
  --shadow-sm:0 1px 2px oklch(0 0 0 / 0.2);--shadow-md:0 4px 12px oklch(0 0 0 / 0.3);--shadow-lg:0 12px 32px oklch(0 0 0 / 0.4);
  --tadas-office-color:#5591c7;--tadas-office-bg:#18304a;--tadas-office-border:#5591c7;
  --tadas-home-color:#7eb8e8;--tadas-home-bg:#122840;--tadas-home-border:#7eb8e8;
  --barca-color:#f07090;--barca-bg:#3d1020;--barca-border:#f07090;
  --task-color:#fdab43;--task-bg:#2e1f0a;
}}

*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{-webkit-font-smoothing:antialiased}
body{min-height:100dvh;font-family:var(--font-body);font-size:var(--text-base);color:var(--color-text);background:var(--color-bg);line-height:1.5}
button{cursor:pointer;background:none;border:none;font:inherit;color:inherit}
:focus-visible{outline:2px solid var(--color-primary);outline-offset:3px;border-radius:var(--radius-sm)}

.app{max-width:1400px;margin:0 auto;padding:var(--space-4)}.main-layout{display:grid;grid-template-columns:1fr 280px;gap:var(--space-4);align-items:start}.main-layout .timeline-wrapper{min-width:0}

/* HEADER */
.header{display:flex;align-items:center;justify-content:space-between;margin-bottom:var(--space-3);gap:var(--space-4);flex-wrap:wrap}
.logo{display:flex;align-items:center;gap:var(--space-2)}
.logo svg{color:var(--color-primary)}
.logo-text{font-size:var(--text-lg);font-weight:700;letter-spacing:-0.02em}
.header-actions{display:flex;align-items:center;gap:var(--space-2)}

.btn{display:inline-flex;align-items:center;gap:var(--space-2);padding:var(--space-2) var(--space-4);font-size:var(--text-sm);font-weight:500;border-radius:var(--radius-md);transition:background var(--transition),box-shadow var(--transition),opacity var(--transition);white-space:nowrap}
.btn-primary{background:var(--color-primary);color:white;box-shadow:var(--shadow-sm)}
.btn-primary:hover{background:var(--color-primary-hover);box-shadow:var(--shadow-md)}
.btn-secondary{background:var(--color-surface-offset);color:var(--color-text);border:1px solid oklch(from var(--color-text) l c h / 0.12)}
.btn-secondary:hover{background:var(--color-surface-dynamic)}
.btn-swap{background:linear-gradient(135deg,var(--tadas-office-bg),var(--barca-bg));color:var(--color-text);border:1px solid oklch(from var(--color-text) l c h / 0.12);font-weight:600}
.btn-swap:hover:not(:disabled){box-shadow:var(--shadow-md);filter:brightness(1.08)}
.btn-swap:disabled{opacity:0.38;cursor:not-allowed}
.btn-swap.swapping{animation:swapFlash 0.45s cubic-bezier(0.16,1,0.3,1)}
@keyframes swapFlash{0%{transform:scale(1)}30%{transform:scale(0.95)}60%{transform:scale(1.04)}100%{transform:scale(1)}}
.theme-toggle{padding:var(--space-2);border-radius:var(--radius-md);background:var(--color-surface-offset);border:1px solid oklch(from var(--color-text) l c h / 0.08);display:flex;align-items:center;transition:background var(--transition)}
.theme-toggle:hover{background:var(--color-surface-dynamic)}

/* SWAP HINT */
.swap-hint{display:flex;align-items:center;gap:var(--space-3);background:var(--color-surface);border:1px solid oklch(from var(--color-text) l c h / 0.07);border-radius:var(--radius-lg);padding:var(--space-2) var(--space-4);margin-bottom:var(--space-3);font-size:var(--text-sm);color:var(--color-text-muted);flex-wrap:wrap}

/* LEGEND + NAV ROW */
.controls-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:var(--space-3);flex-wrap:wrap;gap:var(--space-3)}
.legend{display:flex;align-items:center;gap:var(--space-4);flex-wrap:wrap}
.legend-item{display:flex;align-items:center;gap:var(--space-2);font-size:var(--text-xs);color:var(--color-text-muted)}
.legend-dot{width:10px;height:10px;border-radius:var(--radius-sm);flex-shrink:0}
.ld-to{background:var(--tadas-office-color)}
.ld-th{background:var(--tadas-home-color)}
.ld-b{background:var(--barca-color)}
.ld-t{background:var(--task-color)}

.week-nav{display:flex;align-items:center;gap:var(--space-3)}
.week-label{font-size:var(--text-sm);font-weight:600;text-align:center;min-width:200px}
.week-sub{font-size:var(--text-xs);font-weight:400;color:var(--color-text-muted);display:block}

/* ===== TIMELINE GRID ===== */
.timeline-wrapper{overflow-x:auto;overflow-y:visible}

.timeline-outer{
  display:grid;
  /* time axis col + 7 day cols */
  grid-template-columns: var(--time-col-width) repeat(7, 1fr);
  min-width: 720px;
}

/* Day header row */
.tl-header-spacer{
  background:var(--color-bg);
  border-bottom:1px solid var(--color-divider);
  position:sticky;top:0;z-index:10;
}
.tl-day-header{
  padding:var(--space-2) var(--space-2);
  text-align:center;
  background:var(--color-surface);
  border-left:1px solid var(--color-divider);
  border-bottom:1px solid var(--color-divider);
  position:sticky;top:0;z-index:10;
  cursor:pointer;
  transition:background var(--transition);
  user-select:none;
}
.tl-day-header:hover{ background:var(--color-surface-offset); }
.tl-day-header.today{ background:oklch(from var(--color-primary) l c h / 0.08); }
.tl-day-header.selected-for-swap{
  background:oklch(from var(--color-primary) l c h / 0.15);
  box-shadow:inset 0 -2px 0 var(--color-primary);
}
.tl-day-header.weekend{ background:var(--color-surface-offset); opacity:.75; cursor:default; }
.dh-name{font-size:var(--text-xs);font-weight:600;text-transform:uppercase;letter-spacing:.05em;color:var(--color-text-muted)}
.dh-num{font-size:var(--text-lg);font-weight:700;line-height:1.1;color:var(--color-text)}
.tl-day-header.today .dh-num{color:var(--color-primary)}
.tl-day-header.selected-for-swap .dh-num{color:var(--color-primary)}
.dh-swap-badge{font-size:9px;color:var(--task-color);font-weight:700;margin-left:3px}

/* Time axis + day body rows */
.tl-body{
  /* spans all cols, used as position parent for the grid lines */
  grid-column: 1 / -1;
  display:grid;
  grid-template-columns: var(--time-col-width) repeat(7, 1fr);
  position:relative;
}

.tl-time-col{
  position:relative;
}

.tl-hour-label{
  position:absolute;
  right:8px;
  font-size:11px;
  color:var(--color-text-faint);
  font-variant-numeric:tabular-nums;
  transform:translateY(-50%);
  white-space:nowrap;
  pointer-events:none;
}

/* Day column body */
.tl-day-col{
  position:relative;
  border-left:1px solid var(--color-divider);
  cursor:pointer;
}
.tl-day-col.weekend{ background:oklch(from var(--color-surface-offset) l c h / 0.5); cursor:default; }

/* Horizontal hour lines */
.tl-hour-line{
  position:absolute;
  left:0;right:0;
  height:1px;
  background:var(--color-divider);
  pointer-events:none;
}
.tl-hour-line.half{
  background:oklch(from var(--color-divider) l c h / 0.5);
}

/* Current time indicator */
.tl-now-line{
  position:absolute;
  left:0;right:0;
  height:2px;
  background:var(--color-primary);
  z-index:5;
  pointer-events:none;
}
.tl-now-dot{
  position:absolute;
  left:-4px;top:-4px;
  width:10px;height:10px;
  border-radius:var(--radius-full);
  background:var(--color-primary);
}

/* ===== EVENT BLOCKS ===== */
.tl-event{
  position:absolute;
  left:3px;right:3px;
  border-radius:var(--radius-sm);
  border-left:3px solid transparent;
  padding:4px 6px;
  overflow:hidden;
  cursor:default;
  transition:filter var(--transition),box-shadow var(--transition);
  z-index:2;
}
.tl-event:hover{ filter:brightness(1.07); box-shadow:var(--shadow-sm); }

.tl-event.shift-tadas-office{background:var(--tadas-office-bg);color:var(--tadas-office-color);border-left-color:var(--tadas-office-border)}
.tl-event.shift-tadas-home{background:var(--tadas-home-bg);color:var(--tadas-home-color);border-left-color:var(--tadas-home-border)}
.tl-event.shift-barca{background:var(--barca-bg);color:var(--barca-color);border-left-color:var(--barca-border)}
.tl-event.task{background:var(--task-bg);color:var(--task-color);border-left-color:var(--task-color)}

.ev-time{font-size:10px;opacity:.65;display:block;margin-bottom:1px}
.ev-label{font-size:var(--text-xs);font-weight:700;display:block;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ev-person{font-size:10px;opacity:.7;display:block;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ev-delete{position:absolute;top:3px;right:4px;font-size:10px;opacity:0;transition:opacity var(--transition);cursor:pointer;line-height:1}
.tl-event:hover .ev-delete{opacity:.5}
.tl-event:hover .ev-delete:hover{opacity:1}
.repeat-badge{font-size:9px;opacity:.4;margin-left:2px}

/* ADD EVENT overlay in day col */
.tl-add-btn{
  position:absolute;
  bottom:6px;right:6px;
  padding:3px 8px;
  border-radius:var(--radius-full);
  font-size:11px;
  font-weight:600;
  background:var(--color-surface-dynamic);
  color:var(--color-text-muted);
  border:1px dashed oklch(from var(--color-text) l c h / 0.15);
  opacity:0;
  transition:opacity var(--transition);
  z-index:3;
}
.tl-day-col:hover .tl-add-btn{ opacity:1; }

/* MODAL */
.modal-overlay{position:fixed;inset:0;background:oklch(0 0 0 / 0.55);backdrop-filter:blur(4px);z-index:100;display:flex;align-items:center;justify-content:center;padding:var(--space-4);opacity:0;pointer-events:none;transition:opacity 0.2s ease}
.modal-overlay.open{opacity:1;pointer-events:all}
.modal{background:var(--color-surface);border:1px solid oklch(from var(--color-text) l c h / 0.1);border-radius:var(--radius-xl);padding:var(--space-6);width:100%;max-width:460px;box-shadow:var(--shadow-lg);transform:scale(0.96) translateY(8px);transition:transform 0.25s cubic-bezier(0.16,1,0.3,1)}
.modal-overlay.open .modal{transform:scale(1) translateY(0)}
.modal-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:var(--space-5)}
.modal-title{font-size:var(--text-lg);font-weight:700}
.modal-close{width:32px;height:32px;display:flex;align-items:center;justify-content:center;border-radius:var(--radius-md);background:var(--color-surface-offset);transition:background var(--transition)}
.modal-close:hover{background:var(--color-surface-dynamic)}
.form-group{margin-bottom:var(--space-4)}
.form-label{display:block;font-size:var(--text-sm);font-weight:500;margin-bottom:var(--space-2);color:var(--color-text-muted)}
.form-control{width:100%;padding:var(--space-2) var(--space-3);border-radius:var(--radius-md);background:var(--color-surface-offset);border:1px solid oklch(from var(--color-text) l c h / 0.12);color:var(--color-text);font:inherit;font-size:var(--text-sm);transition:border-color var(--transition),box-shadow var(--transition)}
.form-control:focus{outline:none;border-color:var(--color-primary);box-shadow:0 0 0 3px oklch(from var(--color-primary) l c h / 0.15)}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:var(--space-3)}
.type-grid{display:grid;grid-template-columns:1fr 1fr;gap:var(--space-2)}
.type-btn{padding:var(--space-2) var(--space-3);border-radius:var(--radius-md);font-size:var(--text-xs);font-weight:600;border:2px solid transparent;transition:all var(--transition);text-align:left}
.type-btn.t-office{background:var(--tadas-office-bg);color:var(--tadas-office-color)}
.type-btn.t-home{background:var(--tadas-home-bg);color:var(--tadas-home-color)}
.type-btn.t-barca{background:var(--barca-bg);color:var(--barca-color)}
.type-btn.t-task{background:var(--task-bg);color:var(--task-color)}
.type-btn.selected{border-color:currentColor;box-shadow:0 0 0 2px oklch(from currentColor l c h / 0.2)}
.form-footer{display:flex;gap:var(--space-2);justify-content:flex-end;margin-top:var(--space-5);padding-top:var(--space-4);border-top:1px solid var(--color-divider)}

/* ===== TODO PANEL ===== */
.todo-panel{background:var(--color-surface);border:1px solid oklch(from var(--color-text) l c h / 0.08);border-radius:var(--radius-lg);padding:var(--space-4);position:sticky;top:var(--space-4)}
.todo-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:var(--space-3)}
.todo-title{font-size:var(--text-sm);font-weight:700;letter-spacing:.01em}
.todo-add-btn{width:28px;height:28px;display:flex;align-items:center;justify-content:center;border-radius:var(--radius-md);background:var(--color-primary);color:white;font-size:16px;font-weight:600;transition:background var(--transition)}
.todo-add-btn:hover{background:var(--color-primary-hover)}
.todo-list{display:flex;flex-direction:column;gap:var(--space-2)}
.todo-item{display:flex;align-items:flex-start;gap:var(--space-2);padding:var(--space-2) var(--space-3);border-radius:var(--radius-md);background:var(--color-surface-offset);border:1px solid oklch(from var(--color-text) l c h / 0.06);transition:background var(--transition)}
.todo-item:hover{background:var(--color-surface-dynamic)}
.todo-check{width:16px;height:16px;border-radius:var(--radius-sm);border:1.5px solid oklch(from var(--color-text) l c h / 0.25);flex-shrink:0;margin-top:2px;cursor:pointer;transition:background var(--transition),border-color var(--transition);appearance:none;-webkit-appearance:none}
.todo-check:checked{background:var(--color-primary);border-color:var(--color-primary)}
.todo-item.done .todo-text{text-decoration:line-through;opacity:.4}
.todo-info{flex:1;min-width:0}
.todo-person{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.05em;margin-bottom:1px}
.todo-person.p-tadas{color:var(--tadas-office-color)}
.todo-person.p-barca{color:var(--barca-color)}
.todo-text{font-size:var(--text-xs);font-weight:500;display:block;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.todo-deadline{font-size:10px;color:var(--color-text-faint);margin-top:1px;display:block}
.todo-deadline.overdue{color:#e05a5a}
.todo-del{font-size:10px;opacity:0;color:var(--color-text-faint);flex-shrink:0;padding:2px;transition:opacity var(--transition)}
.todo-item:hover .todo-del{opacity:.5}
.todo-del:hover{opacity:1!important}
.todo-form{margin-top:var(--space-3);padding-top:var(--space-3);border-top:1px solid var(--color-divider);display:none;flex-direction:column;gap:var(--space-2)}
.todo-form.open{display:flex}
.todo-form .form-control{padding:6px 10px;font-size:var(--text-xs)}
.todo-person-btns{display:flex;gap:var(--space-1)}
.todo-person-btn{flex:1;padding:5px;font-size:11px;font-weight:600;border-radius:var(--radius-sm);border:1.5px solid transparent;transition:all var(--transition)}
.todo-person-btn.tp-tadas{background:var(--tadas-office-bg);color:var(--tadas-office-color)}
.todo-person-btn.tp-barca{background:var(--barca-bg);color:var(--barca-color)}
.todo-person-btn.selected{border-color:currentColor}
.todo-save-btn{width:100%;padding:6px;border-radius:var(--radius-md);background:var(--color-primary);color:white;font-size:var(--text-xs);font-weight:600;transition:background var(--transition)}
.todo-save-btn:hover{background:var(--color-primary-hover)}
</style>
</head>
<body>
<div class="app">

  <header class="header">
    <div class="logo">
      <svg width="26" height="26" viewBox="0 0 28 28" fill="none" aria-label="Plán">
        <rect x="2" y="4" width="24" height="22" rx="4" stroke="currentColor" stroke-width="2"/>
        <path d="M2 10h24" stroke="currentColor" stroke-width="2"/>
        <rect x="7" y="3" width="3" height="4" rx="1.5" fill="currentColor"/>
        <rect x="18" y="3" width="3" height="4" rx="1.5" fill="currentColor"/>
        <circle cx="9" cy="16" r="1.5" fill="currentColor" opacity="0.5"/>
        <circle cx="14" cy="16" r="1.5" fill="currentColor"/>
        <circle cx="19" cy="16" r="1.5" fill="currentColor" opacity="0.5"/>
      </svg>
      <span class="logo-text">Plán</span>
    </div>
    <div class="header-actions">
      <button class="btn btn-swap" id="swapBtn" onclick="swapSelectedDay()" disabled>
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M7 16V4m0 0L3 8m4-4l4 4"/><path d="M17 8v12m0 0l4-4m-4 4l-4-4"/></svg>
        Přehodit směny
      </button>
      <button class="theme-toggle" id="themeToggle" aria-label="Přepnout motiv">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
      </button>
    </div>
  </header>

  <div class="swap-hint">
    <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="flex-shrink:0;color:var(--color-primary)"><path d="M7 16V4m0 0L3 8m4-4l4 4"/><path d="M17 8v12m0 0l4-4m-4 4l-4-4"/></svg>
    <span id="swapHintText"><strong>Klikni na název dne</strong> pro výběr, pak stiskni tlačítko Přehodit směny.</span>
  </div>

  <div class="controls-row">
    <div class="legend">
      <div class="legend-item"><div class="legend-dot ld-to"></div><span>Tadeáš – Kancelář</span></div>
      <div class="legend-item"><div class="legend-dot ld-th"></div><span>Tadeáš – Home office</span></div>
      <div class="legend-item"><div class="legend-dot ld-b"></div><span>Barča</span></div>
      <div class="legend-item"><div class="legend-dot ld-t"></div><span>Task</span></div>
    </div>
    <div class="week-nav">
      <button class="btn btn-secondary" onclick="changeWeek(-1)">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M15 18l-6-6 6-6"/></svg>
        Předchozí
      </button>
      <div class="week-label">
        <span id="weekRangeLabel">—</span>
        <span class="week-sub" id="weekNumLabel"></span>
      </div>
      <button class="btn btn-secondary" onclick="changeWeek(1)">
        Další
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M9 18l6-6-6-6"/></svg>
      </button>
    </div>
  </div>

  <div class="main-layout"><div class="timeline-wrapper">
    <div class="timeline-outer" id="timelineOuter"></div>
  </div>
</div><!-- end timeline-wrapper -->

  <!-- TODO PANEL -->
  <aside class="todo-panel">
    <div class="todo-header">
      <span class="todo-title">📋 To-do</span>
      <button class="todo-add-btn" onclick="toggleTodoForm()" aria-label="Přidat úkol">+</button>
    </div>
    <div id="todoList" class="todo-list"></div>
    <div class="todo-form" id="todoForm">
      <div class="todo-person-btns">
        <button class="todo-person-btn tp-tadas selected" id="tpTadas" onclick="selectTodoPerson('tadas')">Tadeáš</button>
        <button class="todo-person-btn tp-barca" id="tpBarca" onclick="selectTodoPerson('barca')">Barča</button>
      </div>
      <input type="text" class="form-control" id="todoText" placeholder="Název úkolu…">
      <input type="date" class="form-control" id="todoDeadline">
      <button class="todo-save-btn" onclick="saveTodo()">Přidat úkol</button>
    </div>
  </aside>
</div><!-- end main-layout -->

<!-- MODAL -->
<div class="modal-overlay" id="modalOverlay" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
  <div class="modal">
    <div class="modal-header">
      <h2 class="modal-title" id="modalTitle">Nová událost</h2>
      <button class="modal-close" onclick="closeModal()" aria-label="Zavřít">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M18 6L6 18M6 6l12 12"/></svg>
      </button>
    </div>
    <div class="form-group">
      <label class="form-label">Typ události</label>
      <div class="type-grid">
        <button class="type-btn t-office selected" data-type="shift-tadas-office" onclick="selectType(this)">🔵 Tadeáš – Kancelář</button>
        <button class="type-btn t-home" data-type="shift-tadas-home" onclick="selectType(this)">🏠 Tadeáš – Home</button>
        <button class="type-btn t-barca" data-type="shift-barca" onclick="selectType(this)">🔴 Barča – Směna</button>
        <button class="type-btn t-task" data-type="task" onclick="selectType(this)">📌 Task / ostatní</button>
      </div>
    </div>
    <div class="form-group">
      <label class="form-label" for="eventLabel">Popis</label>
      <input type="text" class="form-control" id="eventLabel" placeholder="např. Meeting, Editace, Nákup…">
    </div>
    <div class="form-row">
      <div class="form-group" style="margin-bottom:0">
        <label class="form-label" for="eventFrom">Od</label>
        <input type="time" class="form-control" id="eventFrom" value="07:00">
      </div>
      <div class="form-group" style="margin-bottom:0">
        <label class="form-label" for="eventTo">Do</label>
        <input type="time" class="form-control" id="eventTo" value="14:00">
      </div>
    </div>
    <div class="form-group" style="margin-top:var(--space-4)">
      <label class="form-label" for="eventRepeat">Opakování</label>
      <select class="form-control" id="eventRepeat">
        <option value="none">Jednorázově</option>
        <option value="weekly">Každý týden (tento den)</option>
        <option value="workdays">Každý pracovní den (Po–Pá)</option>
      </select>
    </div>
    <div class="form-footer">
      <button class="btn btn-secondary" onclick="closeModal()">Zrušit</button>
      <button class="btn btn-primary" onclick="saveEvent()">Přidat</button>
    </div>
  </div>
</div>

<script>
// ===== CONFIG =====
const START_HOUR = 6;   // 06:00
const END_HOUR   = 22;  // 22:00
const HOUR_PX    = 44;  // px per hour
const TOTAL_H    = (END_HOUR - START_HOUR) * HOUR_PX; // total grid height px

// ===== STATE =====
let currentWeekOffset = 0;
let selectedType = 'shift-tadas-office';
let currentDayKey = null, currentDayObj = null;
let swappedDays = {};   // dateKey → true
let events = {};        // dateKey → [{id,type,label,from,to}]
let recurringRules = [];
let ruleId = 1, evId = 1;
let swapSelectedKey = null;

// ===== BASE SHIFTS =====
const BASE_SHIFTS = [
  {type:'shift-tadas-office', label:'Ranní směna',     from:'07:00', to:'14:00', days:[1,3,5]},
  {type:'shift-tadas-home',   label:'Odpolední směna', from:'14:00', to:'21:00', days:[2,4]},
  {type:'shift-barca',        label:'Ranní směna',     from:'07:00', to:'14:00', days:[2,4]},
  {type:'shift-barca',        label:'Odpolední směna', from:'14:00', to:'21:00', days:[1,3,5]},
];
BASE_SHIFTS.forEach(def => def.days.forEach(dow => {
  recurringRules.push({id:ruleId++, type:def.type, label:def.label, from:def.from, to:def.to, dayOfWeek:dow, base:true});
}));

// ===== UTILS =====
function getMonday(date){
  const d=new Date(date),day=d.getDay();
  d.setDate(d.getDate()-day+(day===0?-6:1)); d.setHours(0,0,0,0); return d;
}
function dateKey(d){ return d.toISOString().split('T')[0]; }
function formatRange(mon){
  const sun=new Date(mon); sun.setDate(sun.getDate()+6);
  return mon.toLocaleDateString('cs-CZ',{day:'numeric',month:'long'})+' – '+sun.toLocaleDateString('cs-CZ',{day:'numeric',month:'long'});
}
function weekNum(d){
  const u=new Date(Date.UTC(d.getFullYear(),d.getMonth(),d.getDate()));
  const dn=u.getUTCDay()||7; u.setUTCDate(u.getUTCDate()+4-dn);
  const ys=new Date(Date.UTC(u.getUTCFullYear(),0,1));
  return Math.ceil((((u-ys)/86400000)+1)/7);
}
function timeToMinutes(t){ const [h,m]=t.split(':').map(Number); return h*60+m; }
function minutesToPx(min){ return ((min - START_HOUR*60) / 60) * HOUR_PX; }

const DN=['Ne','Po','Út','St','Čt','Pá','So'];
const DNF=['Neděle','Pondělí','Úterý','Středa','Čtvrtek','Pátek','Sobota'];

// ===== SWAP =====
function getEffectiveType(type, key){
  if(!swappedDays[key]) return type;
  if(type==='shift-tadas-office'||type==='shift-tadas-home') return 'shift-barca';
  if(type==='shift-barca') return 'shift-tadas-office';
  return type;
}
function getChipMeta(type, key){
  const eff=getEffectiveType(type,key);
  if(eff==='shift-tadas-office') return {cls:'shift-tadas-office',person:'Tadeáš',loc:'Kancelář'};
  if(eff==='shift-tadas-home')   return {cls:'shift-tadas-home',  person:'Tadeáš',loc:'Home office'};
  if(eff==='shift-barca')        return {cls:'shift-barca',       person:'Barča', loc:''};
  return {cls:'task',person:'',loc:''};
}

function selectDayForSwap(key, dayObj){
  const dow=dayObj.getDay();
  if(dow===0||dow===6) return;
  if(swapSelectedKey===key){
    swapSelectedKey=null;
    document.getElementById('swapBtn').disabled=true;
    document.getElementById('swapHintText').innerHTML='<strong>Klikni na název dne</strong> pro výběr, pak stiskni tlačítko Přehodit směny.';
  } else {
    swapSelectedKey=key;
    document.getElementById('swapBtn').disabled=false;
    const isSwapped=swappedDays[key];
    const dl=DNF[dow]+' '+dayObj.getDate()+'.';
    document.getElementById('swapHintText').innerHTML=
      `Vybrán: <strong>${dl}</strong>${isSwapped?' · <span style="color:var(--task-color)">↺ přehozeno</span>':''} — klikni <strong>Přehodit směny</strong>`;
  }
  renderCalendar();
}

function swapSelectedDay(){
  if(!swapSelectedKey) return;
  const btn=document.getElementById('swapBtn');
  btn.classList.add('swapping');
  setTimeout(()=>btn.classList.remove('swapping'),450);
  if(swappedDays[swapSelectedKey]) delete swappedDays[swapSelectedKey];
  else swappedDays[swapSelectedKey]=true;
  const isSwapped=swappedDays[swapSelectedKey];
  const [y,m,d]=swapSelectedKey.split('-').map(Number);
  const dayObj=new Date(y,m-1,d);
  const dl=DNF[dayObj.getDay()]+' '+dayObj.getDate()+'.';
  document.getElementById('swapHintText').innerHTML=
    `Vybrán: <strong>${dl}</strong>${isSwapped?' · <span style="color:var(--task-color)">↺ přehozeno</span>':''} — klikni znovu pro vrácení`;
  renderCalendar();
}

// ===== RENDER =====
function renderCalendar(){
  const outer=document.getElementById('timelineOuter');
  outer.innerHTML='';
  const today=new Date(); today.setHours(0,0,0,0);
  const mon=getMonday(today); mon.setDate(mon.getDate()+currentWeekOffset*7);
  document.getElementById('weekRangeLabel').textContent=formatRange(mon);
  document.getElementById('weekNumLabel').textContent='Týden '+weekNum(mon);

  const days=[];
  for(let i=0;i<7;i++){
    const d=new Date(mon); d.setDate(d.getDate()+i); days.push(d);
  }

  // ---- HEADER ROW ----
  // Spacer for time col
  const hSpacer=document.createElement('div');
  hSpacer.className='tl-header-spacer';
  outer.appendChild(hSpacer);

  days.forEach(day=>{
    const dow=day.getDay();
    const key=dateKey(day);
    const isToday=day.getTime()===today.getTime();
    const isWeekend=dow===0||dow===6;
    const isSel=swapSelectedKey===key;
    const isSwapped=!!swappedDays[key];

    const hd=document.createElement('div');
    let cls='tl-day-header';
    if(isToday) cls+=' today';
    if(isWeekend) cls+=' weekend';
    if(isSel) cls+=' selected-for-swap';
    hd.className=cls;
    hd.innerHTML=`
      <div class="dh-name">${DN[dow]}</div>
      <div class="dh-num">${day.getDate()}${isSwapped?'<span class="dh-swap-badge">↺</span>':''}</div>
    `;
    if(!isWeekend) hd.addEventListener('click',()=>selectDayForSwap(key,day));
    outer.appendChild(hd);
  });

  // ---- BODY ROW ----
  const body=document.createElement('div');
  body.className='tl-body';
  body.style.height=TOTAL_H+'px';
  outer.appendChild(body);

  // Time axis
  const timeCol=document.createElement('div');
  timeCol.className='tl-time-col';
  timeCol.style.height=TOTAL_H+'px';
  for(let h=START_HOUR;h<=END_HOUR;h++){
    const lbl=document.createElement('div');
    lbl.className='tl-hour-label';
    lbl.style.top=((h-START_HOUR)*HOUR_PX)+'px';
    lbl.textContent=h+':00';
    timeCol.appendChild(lbl);
  }
  body.appendChild(timeCol);

  // Day columns
  days.forEach(day=>{
    const dow=day.getDay();
    const key=dateKey(day);
    const isWeekend=dow===0||dow===6;

    const col=document.createElement('div');
    col.className='tl-day-col'+(isWeekend?' weekend':'');
    col.style.height=TOTAL_H+'px';

    // Hour lines
    for(let h=START_HOUR;h<=END_HOUR;h++){
      const line=document.createElement('div');
      line.className='tl-hour-line';
      line.style.top=((h-START_HOUR)*HOUR_PX)+'px';
      col.appendChild(line);
      // Half-hour line
      if(h<END_HOUR){
        const half=document.createElement('div');
        half.className='tl-hour-line half';
        half.style.top=((h-START_HOUR)*HOUR_PX + HOUR_PX/2)+'px';
        col.appendChild(half);
      }
    }

    // Current time line (today only)
    if(day.getTime()===new Date().setHours(0,0,0,0)-new Date().setHours(0,0,0,0)+day.getTime() || dateKey(day)===dateKey(new Date())){
      const now=new Date();
      const nowMin=now.getHours()*60+now.getMinutes();
      if(nowMin>=START_HOUR*60 && nowMin<=END_HOUR*60){
        const nowLine=document.createElement('div');
        nowLine.className='tl-now-line';
        nowLine.style.top=minutesToPx(nowMin)+'px';
        const dot=document.createElement('div');
        dot.className='tl-now-dot';
        nowLine.appendChild(dot);
        col.appendChild(nowLine);
      }
    }

    // Events
    const recurring=recurringRules.filter(r=>r.dayOfWeek===dow);
    const manual=events[key]||[];
    const all=[
      ...recurring.map(r=>({...r,isRecurring:true})),
      ...manual.map(e=>({...e,isRecurring:false}))
    ];

    all.forEach(ev=>{
      if(!ev.from||!ev.to) return;
      const startMin=timeToMinutes(ev.from);
      const endMin=timeToMinutes(ev.to);
      if(endMin<=START_HOUR*60||startMin>=END_HOUR*60) return;

      const clampedStart=Math.max(startMin,START_HOUR*60);
      const clampedEnd=Math.min(endMin,END_HOUR*60);
      const top=minutesToPx(clampedStart);
      const height=((clampedEnd-clampedStart)/60)*HOUR_PX;
      if(height<4) return;

      const meta=getChipMeta(ev.type,key);
      const block=document.createElement('div');
      block.className='tl-event '+meta.cls;
      block.style.top=top+'px';
      block.style.height=height+'px';

      const locStr=meta.loc?' · '+meta.loc:'';
      const repeatBadge=ev.isRecurring?'<span class="repeat-badge">↻</span>':'';
      const delBtn=ev.isRecurring?'':`<button class="ev-delete" onclick="deleteEv('${key}','${ev.id}',event)" aria-label="Smazat">✕</button>`;

      block.innerHTML=`
        ${delBtn}
        <span class="ev-time">${ev.from}–${ev.to}</span>
        <span class="ev-label">${ev.label}${repeatBadge}</span>
        ${meta.person?`<span class="ev-person">${meta.person}${locStr}</span>`:''}
      `;
      col.appendChild(block);
    });

    // Add button
    if(!isWeekend){
      const addBtn=document.createElement('button');
      addBtn.className='tl-add-btn';
      addBtn.textContent='+ přidat';
      addBtn.onclick=(e)=>{ e.stopPropagation(); openModal(key,day); };
      col.appendChild(addBtn);
    }

    body.appendChild(col);
  });

  // Scroll to 6:00 on load (first render)
  if(currentWeekOffset===0 && !window._scrolled){
    window._scrolled=true;
    // scroll body so 07:00 is near top
    setTimeout(()=>{
      const scrollTarget = HOUR_PX * 1 - 20; // 1 hour below START
      window.scrollTo({top: outer.getBoundingClientRect().top + window.scrollY + scrollTarget - 120, behavior:'smooth'});
    },100);
  }
}

function changeWeek(d){
  currentWeekOffset+=d;
  swapSelectedKey=null;
  document.getElementById('swapBtn').disabled=true;
  document.getElementById('swapHintText').innerHTML='<strong>Klikni na název dne</strong> pro výběr, pak stiskni tlačítko Přehodit směny.';
  renderCalendar();
}

// ===== MODAL =====
function openModal(key,day){
  currentDayKey=key; currentDayObj=day;
  document.getElementById('modalTitle').textContent=
    `Nová událost – ${DNF[day.getDay()]} ${day.getDate()}. ${day.toLocaleDateString('cs-CZ',{month:'long'})}`;
  document.getElementById('eventLabel').value='';
  document.getElementById('eventFrom').value='07:00';
  document.getElementById('eventTo').value='14:00';
  document.getElementById('eventRepeat').value='none';
  document.querySelectorAll('.type-btn').forEach(b=>b.classList.remove('selected'));
  document.querySelector('.type-btn[data-type="shift-tadas-office"]').classList.add('selected');
  selectedType='shift-tadas-office';
  document.getElementById('modalOverlay').classList.add('open');
  setTimeout(()=>document.getElementById('eventLabel').focus(),50);
}
function closeModal(){
  document.getElementById('modalOverlay').classList.remove('open');
  currentDayKey=null; currentDayObj=null;
}
function selectType(btn){
  document.querySelectorAll('.type-btn').forEach(b=>b.classList.remove('selected'));
  btn.classList.add('selected'); selectedType=btn.dataset.type;
  if(selectedType==='shift-tadas-office'){ document.getElementById('eventFrom').value='07:00'; document.getElementById('eventTo').value='14:00'; }
  else if(selectedType==='shift-tadas-home'||selectedType==='shift-barca'){ document.getElementById('eventFrom').value='14:00'; document.getElementById('eventTo').value='21:00'; }
}
function saveEvent(){
  if(!currentDayKey) return;
  const label=document.getElementById('eventLabel').value.trim();
  const from=document.getElementById('eventFrom').value;
  const to=document.getElementById('eventTo').value;
  const repeat=document.getElementById('eventRepeat').value;
  if(!label){ document.getElementById('eventLabel').focus(); return; }
  if(repeat==='weekly'){
    recurringRules.push({id:ruleId++,type:selectedType,label,from,to,dayOfWeek:currentDayObj.getDay(),base:false});
  } else if(repeat==='workdays'){
    for(let d=1;d<=5;d++) recurringRules.push({id:ruleId++,type:selectedType,label,from,to,dayOfWeek:d,base:false});
  } else {
    events[currentDayKey]=events[currentDayKey]||[];
    events[currentDayKey].push({id:'e'+evId++,type:selectedType,label,from,to});
  }
  closeModal(); renderCalendar();
}
function deleteEv(key,id,e){
  e.stopPropagation();
  events[key]=(events[key]||[]).filter(ev=>ev.id!==id);
  renderCalendar();
}

document.addEventListener('keydown',e=>{ if(e.key==='Escape') closeModal(); });
document.getElementById('modalOverlay').addEventListener('click',e=>{ if(e.target===document.getElementById('modalOverlay')) closeModal(); });

// THEME
(function(){
  const t=document.getElementById('themeToggle'),r=document.documentElement;
  let d=r.getAttribute('data-theme')||(matchMedia('(prefers-color-scheme:dark)').matches?'dark':'light');
  r.setAttribute('data-theme',d);
  function upd(){t.innerHTML=d==='dark'
    ?'<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>'
    :'<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>'}
  upd();
  t.addEventListener('click',()=>{ d=d==='dark'?'light':'dark'; r.setAttribute('data-theme',d); upd(); });
})();

renderCalendar();

// ===== TODO =====
let todos = [
  {id:'t1', person:'tadas', text:'Vysát', deadline:'2026-04-07', done:false},
  {id:'t2', person:'tadas', text:'Vytřít', deadline:'2026-04-07', done:false},
  {id:'t3', person:'tadas', text:'Vyčistit kočky', deadline:'2026-04-08', done:false},
  {id:'t4', person:'barca', text:'Uvařit oběd', deadline:'2026-04-05', done:false},
  {id:'t5', person:'barca', text:'Připravit večeři', deadline:'2026-04-05', done:false},
  {id:'t6', person:'barca', text:'Snídaně', deadline:'2026-04-06', done:false},
];
let todoId = 10;
let todoPerson = 'tadas';

function renderTodos(){
  const list = document.getElementById('todoList');
  list.innerHTML='';
  const sorted = [...todos].sort((a,b)=>{
    if(a.done!==b.done) return a.done?1:-1;
    return (a.deadline||'9999').localeCompare(b.deadline||'9999');
  });
  sorted.forEach(t=>{
    const today = new Date().toISOString().split('T')[0];
    const isOverdue = !t.done && t.deadline && t.deadline < today;
    const dl = t.deadline ? new Date(t.deadline).toLocaleDateString('cs-CZ',{day:'numeric',month:'short'}) : '';
    const item = document.createElement('div');
    item.className = 'todo-item'+(t.done?' done':'');
    item.innerHTML=`
      <input type="checkbox" class="todo-check" ${t.done?'checked':''} onchange="toggleTodo('${t.id}')">
      <div class="todo-info">
        <span class="todo-person p-${t.person}">${t.person==='tadas'?'Tadeáš':'Barča'}</span>
        <span class="todo-text">${t.text}</span>
        ${dl?`<span class="todo-deadline${isOverdue?' overdue':''}">${isOverdue?'⚠ ':''}${dl}</span>`:''}
      </div>
      <button class="todo-del" onclick="deleteTodo('${t.id}')" aria-label="Smazat">✕</button>
    `;
    list.appendChild(item);
  });
}
function toggleTodo(id){
  const t=todos.find(x=>x.id===id); if(t) t.done=!t.done; renderTodos();
}
function deleteTodo(id){
  todos=todos.filter(x=>x.id!==id); renderTodos();
}
function toggleTodoForm(){
  const f=document.getElementById('todoForm');
  f.classList.toggle('open');
  if(f.classList.contains('open')) document.getElementById('todoText').focus();
}
function selectTodoPerson(p){
  todoPerson=p;
  document.getElementById('tpTadas').classList.toggle('selected',p==='tadas');
  document.getElementById('tpBarca').classList.toggle('selected',p==='barca');
}
function saveTodo(){
  const text=document.getElementById('todoText').value.trim();
  const deadline=document.getElementById('todoDeadline').value;
  if(!text) return;
  todos.push({id:'t'+todoId++, person:todoPerson, text, deadline, done:false});
  document.getElementById('todoText').value='';
  document.getElementById('todoDeadline').value='';
  document.getElementById('todoForm').classList.remove('open');
  renderTodos();
}
document.getElementById('todoText').addEventListener('keydown',e=>{ if(e.key==='Enter') saveTodo(); });
renderTodos();

</script>
</body>
</html>
